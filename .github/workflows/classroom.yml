    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TEST_PREDICT_WITH_EMPTY_FRAME_RAISES_ERROR_RESULTS: ${{steps.test_predict_with_empty_frame_raises_error.outputs.result}}
        TEST_POST_PROCESS_FILTERS_AND_CONVERTS_DETECTIONS_RESULTS: ${{steps.test_post_process_filters_and_converts_detections.outputs.result}}
        TEST_POST_PROCESS_DETECTION_EQUAL_THRESHOLD_RESULTS: ${{steps.test_post_process_detection_equal_threshold.outputs.result}}
        TEST_POST_PROCESS_MULTIPLE_OUTPUTS_RESULTS: ${{steps.test_post_process_multiple_outputs.outputs.result}}
        TEST_DETECTOR_WITH_EMPTY_CLASS_FILE_RESULTS: ${{steps.test_detector_with_empty_class_file.outputs.result}}
        TEST_FILTER_WITH_VALID_INDICES_RESULTS: ${{steps.test_filter_with_valid_indices.outputs.result}}
        TEST_FILTER_WITH_EMPTY_INDICES_RESULTS: ${{steps.test_filter_with_empty_indices.outputs.result}}
        TEST_FILTER_WITH_SINGLE_INDEX_RESULTS: ${{steps.test_filter_with_single_index.outputs.result}}
        TEST_FILTER_WITH_EMPTY_INPUT_LISTS_RESULTS: ${{steps.test_filter_with_empty_input_lists.outputs.result}}
        TEST_MAP_VALUES_BETWEEN_ZERO_AND_ONE_RESULTS: ${{steps.test_mAP_values_between_zero_and_one.outputs.result}}
        TEST_HIGH_THRESHOLD_DECREASE_MAP_SCORE_RESULTS: ${{steps.test_high_threshold_decrease_map_score.outputs.result}}
        TEST_LOW_OBJ_SCORES_RESULTS: ${{steps.test_low_obj_scores.outputs.result}}
        TEST_DUPLICATE_BBOXES_RESULTS: ${{steps.test_duplicate_bboxes.outputs.result}}
        TEST_MISCLASSIFICATION_RESULTS: ${{steps.test_misclassification.outputs.result}}
        TEST_FALSE_NEGATIVES_RESULTS: ${{steps.test_false_negatives.outputs.result}}
        TEST_FALSE_POSITIVES_RESULTS: ${{steps.test_false_positives.outputs.result}}
        TEST_GET_PREDICTIONS_RESULTS: ${{steps.test_get_predictions.outputs.result}}
        TEST_GET_ANNOTATIONS_RESULTS: ${{steps.test_get_annotations.outputs.result}}
        TEST_COMPUTE_LOSS_RESULTS: ${{steps.test_compute_loss.outputs.result}}
        TEST_COMPUTE_LOSS_INCREASES_WITH_LOWER_CLASS_PREDICTION_RESULTS: ${{steps.test_compute_loss_increases_with_lower_class_prediction.outputs.result}}
        TEST_COMPUTE_LOSS_INCREASES_WHEN_OBJECTNESS_DECREASES_RESULTS: ${{steps.test_compute_loss_increases_when_objectness_decreases.outputs.result}}
        TEST_ALL_HIGHLY_OVERLAPPING_BOXES_ARE_COMPUTED_RESULTS: ${{steps.test_all_highly_overlapping_boxes_are_computed.outputs.result}}
        TEST_NON_OVERLAPPING_BOXES_DO_NOT_CONTRIBUTE_RESULTS: ${{steps.test_non_overlapping_boxes_do_not_contribute.outputs.result}}
        TEST_LOSS_INCREASES_WITH_BBOX_SHIFT_RESULTS: ${{steps.test_loss_increases_with_bbox_shift.outputs.result}}
        TEST_LOSS_INCREASES_WHEN_TRUE_OBJECT_OBJECTNESS_IS_LOW_RESULTS: ${{steps.test_loss_increases_when_true_object_objectness_is_low.outputs.result}}
        TEST_FALSE_POSITIVE_OBJECTNESS_LOSS_RESULTS: ${{steps.test_false_positive_objectness_loss.outputs.result}}
        TEST_SAMPLE_BY_TOTAL_LOSS_RESULTS: ${{steps.test_sample_by_total_loss.outputs.result}}
        TEST_ALL_LOSS_COMPONENTS_EXIST_RESULTS: ${{steps.test_all_loss_components_exist.outputs.result}}
        TEST_SORTING_BY_CLASS_LOSS_RESULTS: ${{steps.test_sorting_by_class_loss.outputs.result}}
        TEST_EQUAL_TOTAL_LOSS_RESULTS: ${{steps.test_equal_total_loss.outputs.result}}
        TEST_NEGATIVE_LOSS_VALUES_RESULTS: ${{steps.test_negative_loss_values.outputs.result}}
        TEST_ZERO_LOSS_VALUES_RESULTS: ${{steps.test_zero_loss_values.outputs.result}}
        TEST_DIFFERENT_CRITERIA_CHANGE_ORDER_RESULTS: ${{steps.test_different_criteria_change_order.outputs.result}}
        TEST_FEWER_THAN_REQUESTED_RESULTS: ${{steps.test_fewer_than_requested.outputs.result}}
        TEST_INVALID_COLUMN_RESULTS: ${{steps.test_invalid_column.outputs.result}}
        TEST_PRESERVES_METADATA_COLUMNS_RESULTS: ${{steps.test_preserves_metadata_columns.outputs.result}}
        TEST_DATA_TYPES_PRESERVED_RESULTS: ${{steps.test_data_types_preserved.outputs.result}}
        TEST_CAPTURE_VIDEO_YIELDS_EVERY_NTH_FRAME_FROM_LIST_RESULTS: ${{steps.test_capture_video_yields_every_nth_frame_from_list.outputs.result}}
        TEST_CAPTURE_VIDEO_FROM_DIRECTORY_WITH_50_FRAMES_RESULTS: ${{steps.test_capture_video_from_directory_with_50_frames.outputs.result}}
        TEST_VIDEO_FILE_NOT_OPENED_RESULTS: ${{steps.test_video_file_not_opened.outputs.result}}
        TEST_DETECTOR_INTEGRATION_WITH_STORAGE_IMAGES_RESULTS: ${{steps.test_detector_integration_with_storage_images.outputs.result}}
      with: 
        runners: test_predict_with_empty_frame_raises_error,
          test_post_process_filters_and_converts_detections,
          test_post_process_detection_equal_threshold,
          test_post_process_multiple_outputs,
          test_detector_with_empty_class_file,
          test_filter_with_valid_indices,
          test_filter_with_empty_indices,
          test_filter_with_single_index,
          test_filter_with_empty_input_lists,
          test_mAP_values_between_zero_and_one,
          test_high_threshold_decrease_map_score,
          test_low_obj_scores,
          test_duplicate_bboxes,
          test_misclassification,
          test_false_negatives,
          test_false_positives,
          test_get_predictions,
          test_get_annotations,
          test_compute_loss,

          test_false_positive_objectness_loss,
          test_sample_by_total_loss,
          test_all_loss_components_exist,
          test_sorting_by_class_loss,
          test_equal_total_loss,
          test_negative_loss_values,
          test_zero_loss_values,
          test_different_criteria_change_order,
          test_fewer_than_requested,
          test_invalid_column,
          test_preserves_metadata_columns,
          test_data_types_preserved,
          test_capture_video_yields_every_nth_frame_from_list,
          test_capture_video_from_directory_with_50_frames,
          test_video_file_not_opened,
          test_detector_integration_with_storage_images

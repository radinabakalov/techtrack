name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Downloading yolo_model_1
      run: |
        mkdir -p techtrack/storage
        wget --no-check-certificate \
          "https://www.dropbox.com/scl/fo/i4fdjtg9tigyjchjs61n0/AA2AaIy4HsoLHRkwmvVC5iU?rlkey=ke6ji9wfweorx0bd5phs2dlho&st=ixsk44d1&dl=1" \
          -O model_archive.zip
          
    - name: Extract YOLO model
      run: |
        mkdir -p techtrack/storage/yolo_model_1
        unzip model_archive.zip -d techtrack/storage/yolo_model_1 || true
        
    - name:  Download Downloading yolo_model_2
      run: |
        wget --no-check-certificate \
         "https://www.dropbox.com/scl/fo/mpqudwxmwnm2lbf8d2mo7/AOftARd-DHMPcCp800cUl3g?rlkey=3fhqixu6lalcku9o259io6b5z&st=1iiljn0i&dl=1" \
          -O model_archive_2.zip
          
    - name: Extract YOLO model
      run: |
        mkdir -p techtrack/storage/yolo_model_2
        unzip model_archive_2.zip -d techtrack/storage/yolo_model_2 || true
        
    - name: Download test videos
      run: |
        wget --no-check-certificate \
          "https://livejohnshopkins-my.sharepoint.com/:u:/g/personal/jpulido6_jh_edu/IQBJIuTDpeqiRZJvYQJxNREKAXLhjXybZNm2AKkQxC8vy6o?e=hTyM8O" \
          -O test_videos.zip

    - name: Extract test videos 
      run: |
        mkdir -p techtrack/storage/test_videos
        unzip test_videos.zip -d techtrack/storage/test_videos || true
        
    - name: Download logistics
      run: |
        wget --no-check-certificate \
          "https://livejohnshopkins-my.sharepoint.com/:u:/g/personal/jpulido6_jh_edu/IQC83xUcRiY3T5jOXuZQK__yAUXV9vahEIRIxBY8i0NKSEE?e=lZaugX" \
          -O logistics.zip
          
    - name: Extract logistics
      run: |
        mkdir -p techtrack/storage/logistics
        unzip logistics.zip -d techtrack/storage/logistics || true
        
          
    - name: Install dependencies
      run: pip install --user -r techtrack/requirements.txt
    - name: test_predict_with_empty_frame_raises_error
      id: test_predict_with_empty_frame_raises_error
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: test_predict_with_empty_frame_raises_error
        command: python test/grade_runner.py test_predict_with_empty_frame_raises_error
          1
        timeout: 20
        max-score: 5
    - name: test_post_process_filters_and_converts_detections
